name: Bug report
description: Something in 1op doesn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **Security issue?** Do not file it here — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong? Paste command output (redact real secrets).
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 1op version / commit
    validations:
      required: false
  - type: input
    id: env
    attributes:
      label: OS + Node version
    validations:
      required: false
