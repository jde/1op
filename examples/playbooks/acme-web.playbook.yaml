# Example playbook — totally fake, safe to publish. This is what the
# `generate-playbook` skill writes into each of your real repos at /.ops/playbook.yaml
app: acme-web
description: Marketing site + customer dashboard (Turborepo monorepo)
repo: https://github.com/acme/web
packageManager: pnpm
type: real      # filter the dashboard by this — real | experiment | archived | …
weight: 9       # 1–10 priority; the dashboard sorts highest-first

# Key commands and WHICH FOLDER to run them in — the monorepo lifesaver.
commands:
  - label: install
    run: pnpm install
  - label: dev (web)
    run: pnpm dev
    cwd: apps/web
  - label: dev (admin)
    run: pnpm dev
    cwd: apps/admin
  - label: db reset + seed
    run: pnpm db:reset && pnpm db:seed
    cwd: packages/db

# The enforced two-script data standard for dev:
#   reset → clear DB + load the app BASELINE (categories/tags/types/base data)
#   seed  → add USERLAND sample data on top so it's not an empty app
data:
  reset: pnpm db:reset
  seed: pnpm db:seed

# Local dev dependencies 1op stands up and wires into .env.
# Connection strings here are LOCAL + PUBLIC (localhost, default local creds).
dependencies:
  - name: db
    kind: postgres
    version: "16"
    port: 5432
    seed: true
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:{port}/acme_dev
  - name: cache
    kind: redis
    port: 6379
    env:
      REDIS_URL: redis://localhost:{port}
  - name: queue
    kind: rabbitmq
    port: 5672
    env:
      AMQP_URL: amqp://guest:guest@localhost:{port}
  - name: storage
    kind: minio
    port: 9000
    env:
      S3_ENDPOINT: http://localhost:{port}
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin

envs:
  dev:
    url: http://localhost:3000
    start: pnpm dev
    accounts:
      source: seed
      seedFile: ../seeds/acme-web.seed.ts # dev logins live in committed code
      users: # mirrored from the seed (public) so agents can drive the app
        - { email: admin@acme.test, password: password123, role: admin }
        - { email: member@acme.test, password: password123, role: member }
        - { email: readonly@acme.test, password: password123, role: viewer }
    gotchas:
      - run `docker compose up db` first or auth throws a 500
      - port is set by PORT in .env, defaults to 3000
  staging:
    url: https://staging.acme.dev
    accounts:
      source: vault
      vaultItem: Acme — staging # a 1Password item NAME. Never the password.
  prod:
    url: https://acme.com
    accounts:
      source: vault
      vaultItem: Acme — production

# Third-party services this app depends on. Names & dashboards, never keys.
integrations:
  - name: Stripe
    url: https://dashboard.stripe.com
    vaultItem: Acme — Stripe
    note: test-mode keys in .env.example; live keys in 1Password
  - name: Sentry
    url: https://acme.sentry.io
    vaultItem: Acme — Sentry
  - name: Resend (email)
    vaultItem: Acme — Resend
